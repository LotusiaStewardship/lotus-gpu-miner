name: Build

on:
  push:
    branches: ["master"]
    tags: ["v*.*.*"]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # -----------------------------------------------------------------------
  # Linux — ubuntu-latest, installs OpenCL + GUI deps via apt
  # -----------------------------------------------------------------------
  build-linux:
    name: Build (Linux)
    runs-on: ubuntu-latest

    steps:
      # Check out lotus-gpu-miner into the default workspace path:
      #   /home/runner/work/lotus-gpu-miner/lotus-gpu-miner
      - uses: actions/checkout@v6

      # Clone bitcoinsuite as a sibling directory so the path-based Cargo
      # dependency resolves correctly at build time.
      # We use `git clone` instead of actions/checkout because the action
      # rejects paths outside GITHUB_WORKSPACE (../bitcoinsuite).
      #   /home/runner/work/lotus-gpu-miner/bitcoinsuite
      - name: Checkout bitcoinsuite (sibling)
        run: git clone --branch master --single-branch --depth 1 https://github.com/LotusiaStewardship/bitcoinsuite.git ../bitcoinsuite

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            ocl-icd-opencl-dev opencl-headers \
            libx11-dev libxext-dev libxrandr-dev libxinerama-dev \
            libxcursor-dev libxi-dev libxss-dev \
            libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            libwayland-dev libxkbcommon-dev \
            libgl1-mesa-dev libegl1-mesa-dev \
            pkg-config zip

      - name: Install Rust stable toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry + build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: linux-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: linux-cargo-

      - name: Build lotus-miner-cli (release)
        run: cargo build --release --package lotus-miner-cli

      - name: Build lotus-miner-gui (release)
        run: cargo build --release --package lotus-miner-gui

      - name: Run tests
        run: cargo test --workspace

      # Stage the binary + kernels/ into a temp directory, then ZIP them.
      # The ZIP preserves the sibling layout the runtime expects:
      #   lotus-miner-cli
      #   kernels/
      #     *.cl  (OpenCL kernels)
      - name: Package release ZIP
        run: |
          mkdir -p staging
          cp target/release/lotus-miner-cli staging/
          cp -r kernels staging/
          cd staging
          zip -r ../lotus-miner-linux-x86_64.zip .

      - name: Upload Linux release ZIP
        uses: actions/upload-artifact@v4
        with:
          name: lotus-miner-linux-x86_64
          path: lotus-miner-linux-x86_64.zip
          if-no-files-found: error

  # -----------------------------------------------------------------------
  # Windows — windows-latest, OpenCL via the vendor-neutral Khronos SDK
  # -----------------------------------------------------------------------
  build-windows:
    name: Build (Windows)
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v6

      # Clone bitcoinsuite as a sibling directory (see Linux job for rationale).
      - name: Checkout bitcoinsuite (sibling)
        run: git clone --branch master --single-branch --depth 1 https://github.com/LotusiaStewardship/bitcoinsuite.git ../bitcoinsuite

      # cl-sys (transitive dep via ocl) does not honour CL_LIB_DIR or
      # CL_INCLUDE_DIR.  It only probes INTELOCLSDKROOT, CUDA_PATH and
      # AMDAPPSDKROOT, then falls back to a hard-coded OCL_SDK_Light path
      # that ships headers-only on GitHub runners (no OpenCL.lib → LNK1181).
      #
      # Setting CUDA_PATH to the Khronos SDK root is the simplest reliable
      # workaround because cl-sys appends "lib\x64" to it, matching the
      # Khronos SDK layout exactly.
      - name: Install OpenCL SDK (Khronos)
        shell: pwsh
        run: |
          $version = "2023.12.14"
          $url = "https://github.com/KhronosGroup/OpenCL-SDK/releases/download/v${version}/OpenCL-SDK-v${version}-Win-x64.zip"
          $dest = "$env:RUNNER_TEMP\opencl-sdk"
          Invoke-WebRequest -Uri $url -OutFile "$env:RUNNER_TEMP\opencl-sdk.zip"
          Expand-Archive -Path "$env:RUNNER_TEMP\opencl-sdk.zip" -DestinationPath $dest
          $sdkRoot = (Get-ChildItem $dest -Directory | Select-Object -First 1).FullName
          echo "CUDA_PATH=$sdkRoot" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Install Rust stable toolchain (MSVC)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Cargo registry + build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: windows-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: windows-cargo-

      - name: Build lotus-miner-cli (release)
        run: cargo build --release --package lotus-miner-cli

      - name: Build lotus-miner-gui (release)
        run: cargo build --release --package lotus-miner-gui

      - name: Run tests
        run: cargo test --workspace

      # Stage binary + kernels/ and ZIP with PowerShell's Compress-Archive.
      # The ZIP preserves the sibling layout the runtime expects:
      #   lotus-miner-cli.exe
      #   kernels/
      #     *.cl  (OpenCL kernels used at runtime on Windows)
      - name: Package release ZIP
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path staging | Out-Null
          Copy-Item target\release\lotus-miner-cli.exe staging\
          Copy-Item -Recurse kernels staging\
          Compress-Archive -Path staging\* -DestinationPath lotus-miner-windows-x86_64.zip

      - name: Upload Windows release ZIP
        uses: actions/upload-artifact@v4
        with:
          name: lotus-miner-windows-x86_64
          path: lotus-miner-windows-x86_64.zip
          if-no-files-found: error

  # -----------------------------------------------------------------------
  # macOS — macos-latest, OpenCL / Metal provided by the system framework.
  # -----------------------------------------------------------------------
  build-macos:
    name: Build (macOS)
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v6

      # Clone bitcoinsuite as a sibling directory (see Linux job for rationale).
      - name: Checkout bitcoinsuite (sibling)
        run: git clone --branch master --single-branch --depth 1 https://github.com/LotusiaStewardship/bitcoinsuite.git ../bitcoinsuite

      # OpenCL.framework and Cocoa/CGL are present on every macOS runner.
      # pkg-config is still needed by some transitive build scripts.
      - name: Install pkg-config
        run: brew install pkg-config

      - name: Install Rust stable toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry + build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: macos-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: macos-cargo-

      - name: Build lotus-miner-cli (release)
        run: cargo build --release --package lotus-miner-cli

      - name: Build lotus-miner-gui (release)
        run: cargo build --release --package lotus-miner-gui

      - name: Run tests
        run: cargo test --workspace

      # Stage binary + kernels/ and ZIP.
      # The ZIP preserves the sibling layout the runtime expects:
      #   lotus-miner-cli
      #   kernels/
      #     *.metal  (Metal kernels used on macOS)
      #     *.cl     (OpenCL kernels also present)
      - name: Package release ZIP
        run: |
          mkdir -p staging
          cp target/release/lotus-miner-cli staging/
          cp -r kernels staging/
          cd staging
          zip -r ../lotus-miner-macos-x86_64.zip .

      - name: Upload macOS release ZIP
        uses: actions/upload-artifact@v4
        with:
          name: lotus-miner-macos-x86_64
          path: lotus-miner-macos-x86_64.zip
          if-no-files-found: error

  # -----------------------------------------------------------------------
  # Release — runs only on version tags (v*.*.*).
  # Downloads the three platform ZIPs built above and attaches them to a
  # GitHub Release. No repacking needed — the ZIPs already contain the
  # correct binary + kernels/ structure at their root.
  # -----------------------------------------------------------------------
  release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-linux, build-windows, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # merge-multiple: true flattens each artifact's subdirectory so all
      # three ZIPs land directly in dist/ rather than dist/<artifact-name>/.
      - name: Download all release ZIPs
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/lotus-miner-linux-x86_64.zip
            dist/lotus-miner-windows-x86_64.zip
            dist/lotus-miner-macos-x86_64.zip
          generate_release_notes: true